services:
  postgres:
    image: postgres:17-alpine
    container_name: pulsehub-users-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulsehub_users}
      POSTGRES_USER: ${POSTGRES_USER:-pulsehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsehub}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pulsehub-users-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pulsehub-users-postgres-data:
