services:
  auth-db:
    image: postgres:17-alpine
    container_name: pulsehub-auth-db
    environment:
      POSTGRES_DB: pulsehub_auth
      POSTGRES_USER: pulsehub
      POSTGRES_PASSWORD: pulsehub
    ports:
      - "5434:5432"
    volumes:
      - pulsehub-auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsehub -d pulsehub_auth"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulsehub-network

  user-db:
    image: postgres:17-alpine
    container_name: pulsehub-user-db
    environment:
      POSTGRES_DB: pulsehub_users
      POSTGRES_USER: pulsehub
      POSTGRES_PASSWORD: pulsehub
    ports:
      - "5433:5432"
    volumes:
      - pulsehub-user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsehub -d pulsehub_users"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulsehub-network

  message-db:
    image: postgres:17-alpine
    container_name: pulsehub-message-db
    environment:
      POSTGRES_DB: pulsehub_messages
      POSTGRES_USER: pulsehub
      POSTGRES_PASSWORD: pulsehub
    ports:
      - "5435:5432"
    volumes:
      - pulsehub-message-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsehub -d pulsehub_messages"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulsehub-network

  rabbitmq:
    image: rabbitmq:4-management
    container_name: pulsehub-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulsehub-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: pulsehub-auth-service
    environment:
      AUTH_SERVER_PORT: 8082
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/pulsehub_auth
      AUTH_DB_USERNAME: pulsehub
      AUTH_DB_PASSWORD: pulsehub
      AUTH_JPA_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-secret-for-pulsehub-docker}
      JWT_EXPIRATION_SECONDS: 3600
    ports:
      - "8082:8082"
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - pulsehub-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: pulsehub-user-service
    environment:
      SERVER_PORT: 8081
      USER_GRPC_SERVER_PORT: 9091
      DB_URL: jdbc:postgresql://user-db:5432/pulsehub_users
      DB_USERNAME: pulsehub
      DB_PASSWORD: pulsehub
      JPA_DDL_AUTO: update
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - pulsehub-network

  message-service:
    build:
      context: .
      dockerfile: message-service/Dockerfile
    container_name: pulsehub-message-service
    environment:
      MESSAGE_SERVER_PORT: 8083
      MESSAGE_DB_URL: jdbc:postgresql://message-db:5432/pulsehub_messages
      MESSAGE_DB_USERNAME: pulsehub
      MESSAGE_DB_PASSWORD: pulsehub
      MESSAGE_JPA_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      USER_GRPC_HOST: user-service
      USER_GRPC_PORT: 9091
      MESSAGE_EVENTS_EXCHANGE: pulsehub.messages
      MESSAGE_PUBLISHED_QUEUE: pulsehub.message-published
      MESSAGE_PUBLISHED_ROUTING_KEY: message.published
    ports:
      - "8083:8083"
    depends_on:
      message-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - pulsehub-network

  bot-service:
    build:
      context: .
      dockerfile: bot-service/Dockerfile
    container_name: pulsehub-bot-service
    environment:
      BOT_SERVER_PORT: 8084
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      MESSAGE_EVENTS_EXCHANGE: pulsehub.messages
      MESSAGE_PUBLISHED_QUEUE: pulsehub.message-published
      MESSAGE_PUBLISHED_ROUTING_KEY: message.published
      MESSAGE_SERVICE_URL: http://message-service:8083
    ports:
      - "8084:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
      message-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - pulsehub-network

  bff-service:
    build:
      context: .
      dockerfile: bff-service/Dockerfile
    container_name: pulsehub-bff-service
    environment:
      BFF_SERVER_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8082
      USER_SERVICE_URL: http://user-service:8081
      MESSAGE_SERVICE_URL: http://message-service:8083
      BFF_CORS_ALLOWED_ORIGINS: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-secret-for-pulsehub-docker}
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - pulsehub-network

networks:
  pulsehub-network:
    name: pulsehub-network

volumes:
  pulsehub-auth-db-data:
  pulsehub-user-db-data:
  pulsehub-message-db-data:
