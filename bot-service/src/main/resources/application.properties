spring.application.name=bot-service
server.port=${BOT_SERVER_PORT:8084}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

pulsehub.rabbitmq.queue=${MESSAGE_PUBLISHED_QUEUE:pulsehub.message-published}
pulsehub.rabbitmq.exchange=${MESSAGE_EVENTS_EXCHANGE:pulsehub.messages}
pulsehub.rabbitmq.routing-key=${MESSAGE_PUBLISHED_ROUTING_KEY:message.published}
pulsehub.services.message-service-url=${MESSAGE_SERVICE_URL:http://localhost:8083}
pulsehub.services.user-service-url=${USER_SERVICE_URL:http://localhost:8081}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
