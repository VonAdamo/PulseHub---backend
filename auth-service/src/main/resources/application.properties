spring.application.name=auth-service
server.port=${AUTH_SERVER_PORT:8082}

spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5433/pulsehub_auth}
spring.datasource.username=${AUTH_DB_USERNAME:pulsehub}
spring.datasource.password=${AUTH_DB_PASSWORD:pulsehub}

spring.jpa.hibernate.ddl-auto=${AUTH_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

auth.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-for-pulsehub-auth-service}
auth.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
