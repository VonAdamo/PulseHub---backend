name: PulseHub Backend CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test auth, bff, bot, message, user
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: pulsehub_users
          POSTGRES_USER: pulsehub
          POSTGRES_PASSWORD: pulsehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulsehub -d pulsehub_users"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:4-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Show Maven reactor modules
        run: |
          echo "PulseHub backend modules:"
          echo "- auth-service"
          echo "- bff-service"
          echo "- bot-service"
          echo "- message-service"
          echo "- user-service"
          ./mvnw -q help:evaluate -Dexpression=project.modules -DforceStdout

      - name: Create service databases
        env:
          PGPASSWORD: pulsehub
        run: |
          psql -h localhost -U pulsehub -d pulsehub_users -c "CREATE DATABASE pulsehub_auth;"
          psql -h localhost -U pulsehub -d pulsehub_users -c "CREATE DATABASE pulsehub_messages;"

      - name: Run Maven reactor tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/pulsehub_users
          DB_USERNAME: pulsehub
          DB_PASSWORD: pulsehub
          JPA_DDL_AUTO: create-drop
          AUTH_DB_URL: jdbc:postgresql://localhost:5432/pulsehub_auth
          AUTH_DB_USERNAME: pulsehub
          AUTH_DB_PASSWORD: pulsehub
          AUTH_JPA_DDL_AUTO: create-drop
          JWT_SECRET: ci-only-secret-for-pulsehub-auth-service-tests
          JWT_EXPIRATION_SECONDS: 3600
          BFF_SERVER_PORT: 8080
          AUTH_SERVICE_URL: http://localhost:8082
          USER_SERVICE_URL: http://localhost:8081
          MESSAGE_SERVICE_URL: http://localhost:8083
          BFF_CORS_ALLOWED_ORIGINS: http://localhost:3000
          MESSAGE_DB_URL: jdbc:postgresql://localhost:5432/pulsehub_messages
          MESSAGE_DB_USERNAME: pulsehub
          MESSAGE_DB_PASSWORD: pulsehub
          MESSAGE_JPA_DDL_AUTO: create-drop
          BOT_SERVER_PORT: 8084
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USERNAME: guest
          RABBITMQ_PASSWORD: guest
          MESSAGE_EVENTS_EXCHANGE: pulsehub.messages
          MESSAGE_PUBLISHED_QUEUE: pulsehub.message-published
          MESSAGE_PUBLISHED_ROUTING_KEY: message.published
        run: ./mvnw -B test
