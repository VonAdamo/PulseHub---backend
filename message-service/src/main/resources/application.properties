spring.application.name=message-service
server.port=${MESSAGE_SERVER_PORT:8083}

spring.datasource.url=${MESSAGE_DB_URL:jdbc:postgresql://localhost:5433/pulsehub_messages}
spring.datasource.username=${MESSAGE_DB_USERNAME:pulsehub}
spring.datasource.password=${MESSAGE_DB_PASSWORD:pulsehub}

spring.jpa.hibernate.ddl-auto=${MESSAGE_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

pulsehub.rabbitmq.messages.exchange=${MESSAGE_EVENTS_EXCHANGE:pulsehub.messages}
pulsehub.rabbitmq.messages.queue=${MESSAGE_PUBLISHED_QUEUE:pulsehub.message-published}
pulsehub.rabbitmq.messages.routing-key=${MESSAGE_PUBLISHED_ROUTING_KEY:message.published}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

pulsehub.grpc.user-service.host=${USER_GRPC_HOST:localhost}
pulsehub.grpc.user-service.port=${USER_GRPC_PORT:9091}
